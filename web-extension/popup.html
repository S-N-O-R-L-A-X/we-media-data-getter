<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=520">
    <title>视频数据提取器</title>
    <style>
        body {
            width: 520px !important;
            max-width: 520px !important;
            min-width: 520px !important;
            overflow-x: hidden !important;
        }
        html {
            width: 520px !important;
            max-width: 520px !important;
        }
        #app, .container {
            width: 520px !important;
            max-width: 520px !important;
        }
    </style>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <header>
            <h1 id="pageTitle">📊 视频数据提取器</h1>
        </header>

        <!-- 状态信息 -->
        <div class="status-panel">
            <div class="status-item">
                <span class="label">已提取总数:</span>
                <span id="totalCount" class="value">0</span>
            </div>
            <div class="status-item">
                <span class="label">抓取状态:</span>
                <span id="extractionStatus" class="status-badge idle">空闲</span>
            </div>
        </div>

        <!-- 自动抓取区 -->
        <section class="action-section">
            <h2>自动抓取</h2>
            <div class="button-row">
                <button id="startAutoBtn" class="btn btn-success">
                    🚀 开始自动抓取
                </button>
            </div>
        </section>

        <!-- 导出区 -->
        <section class="action-section">
            <h2>数据导出</h2>
            <button id="exportCsvBtn" class="btn btn-info">
                📁 导出数据 CSV
            </button>
            <p class="hint">CSV 格式包含：发布日期、视频链接、播放量、点赞、评论、收藏、转发</p>
        </section>

        <!-- 清空数据 -->
        <section class="action-section">
            <button id="clearDataBtn" class="btn btn-secondary">
                🗑️ 清空所有数据
            </button>
        </section>

        <!-- 消息提示 -->
        <div id="messageBox" class="message-box"></div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
