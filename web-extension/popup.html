<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>百度贴吧数据提取器</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 百度贴吧数据提取器</h1>
        </header>

        <!-- 状态信息 -->
        <div class="status-panel">
            <div class="status-item">
                <span class="label">当前页面:</span>
                <span id="currentPage" class="value">--</span>
            </div>
            <div class="status-item">
                <span class="label">已提取总数:</span>
                <span id="totalCount" class="value">0</span>
            </div>
            <div class="status-item">
                <span class="label">抓取状态:</span>
                <span id="extractionStatus" class="status-badge idle">空闲</span>
            </div>
        </div>

        <!-- 自动抓取区 -->
        <section class="action-section">
            <h2>自动抓取</h2>
            <div class="input-group">
                <label for="pageCount">目标页数：</label>
                <input type="number" id="pageCount" class="input-field" value="42" min="1" max="100">
            </div>
            <div class="button-row">
                <button id="startAutoBtn" class="btn btn-success">
                    🚀 开始自动抓取
                </button>
                <button id="stopAutoBtn" class="btn btn-danger" disabled>
                    ⏹️ 停止抓取
                </button>
            </div>
        </section>

        <!-- 导出区 -->
        <section class="action-section">
            <h2>数据导出</h2>
            <button id="exportCsvBtn" class="btn btn-info">
                📁 导出为 CSV 文件
            </button>
            <p class="hint">CSV 格式包含：发布日期、视频标题、链接、浏览数、点赞数、收藏数、回复数、分享数</p>
        </section>

        <!-- 配置区 -->
        <section class="action-section settings-section">
            <h2>⚙️ 设置</h2>
            <div class="input-group">
                <label for="cutoffDate">日期截止点：</label>
                <input type="date" id="cutoffDate" class="input-field">
            </div>
            <div class="input-group">
                <label for="maxPages">默认最大页数：</label>
                <input type="number" id="maxPages" class="input-field" value="42" min="1" max="100">
            </div>
            <div class="input-group">
                <label for="pageDelay">翻页延迟（秒）：</label>
                <input type="number" id="pageDelay" class="input-field" value="3" min="1" max="10">
            </div>
            <button id="saveSettingsBtn" class="btn btn-warning">
                💾 保存设置
            </button>
        </section>

        <!-- 清空数据 -->
        <section class="action-section">
            <button id="clearDataBtn" class="btn btn-secondary">
                🗑️ 清空所有数据
            </button>
        </section>

        <!-- 消息提示 -->
        <div id="messageBox" class="message-box"></div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
